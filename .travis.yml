language: cpp
sudo: required
dist: bionic

os:
  - linux
  - osx

compiler:
  - gcc
  - clang

before_install:
  - if [ $TRAVIS_OS_NAME == linux ]; then 
      sudo apt-get update -qq;
      sudo apt-get install -y --no-install-recommends libxrandr-dev libxi-dev libxxf86vm-dev libsdl2-dev;
    fi

script: 
  - mkdir _build
  - cd _build
  - cmake .. || true
  - make gl3w_gen
  - cmake ..  # Second time for gl3w
  - make imgui-flame-graph-example

